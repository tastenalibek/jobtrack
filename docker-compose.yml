services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobtrack
      POSTGRES_USER: jobtrack
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobtrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://jobtrack:secret@db:5432/jobtrack?sslmode=disable
      JWT_SECRET: change-this-in-production
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
